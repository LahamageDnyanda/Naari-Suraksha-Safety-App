<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naari Suraksha - Your Safety, Our Priority</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #fce4ec, #fff1f8); /* Soft pink gradient */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: #333;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95); /* Slightly transparent white */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #e91e63; /* Vibrant pink */
            font-size: 2.8em;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.15em;
            color: #555;
            margin-bottom: 30px;
        }

        .cta-button {
            background-color: #007bff; /* Primary blue */
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .cta-button:hover {
            background-color: #0056b3;
        }

        .app-icon {
            font-size: 3em;
            color: #e91e63;
            margin-bottom: 20px;
        }

        /* Subtle animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            animation: fadeInUp 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>Naari Suraksha</h1>
        {% if session.get('username') %}
            <p class="slogan" style="margin-bottom: 10px;">Welcome back, <strong>{{ session['username'] }}</strong>!</p>
            <p style="font-size: 1em; color: #777; margin-bottom: 30px;">Account Age: {{ session['age'] }}</p>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap;">
                <a href="/permissions" class="cta-button">
                    <i class="fas fa-arrow-right"></i> Proceed
                </a>
                <a href="/logout" class="cta-button" style="background-color: #6c757d;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        {% else %}
            <p class="slogan">The Power to Be Fearless, The Right to Be Safe.</p>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap;">
                <a href="/login" class="cta-button" style="background-color: #e91e63;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
                <a href="/signup" class="cta-button" style="background-color: #007bff;">
                    <i class="fas fa-user-plus"></i> Sign Up
                </a>
            </div>
        {% endif %}
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js" integrity="sha512-yFjLbHHugv1yRqHc7iFCSzu0Klnc9l7ntflibdQPIAT/SD+PbywCc2DbshJkhnUrEpCB6TwYhGUjhlKH6AYpg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>
</html>
