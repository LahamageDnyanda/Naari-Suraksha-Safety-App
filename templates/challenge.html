<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Challenge</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 rounded">
            <h2 class="text-center text-primary">🛡️ Safety Challenge</h2>
            <p class="text-center">Type the following word within <span id="timer-badge" class="badge bg-danger">{{ time_left }}</span> seconds to confirm you're safe:</p>
            <h3 class="text-center text-danger my-4 fw-bold" style="letter-spacing: 2px;">{{ word }}</h3>

            <form action="/submit_challenge" method="post">
                <div class="mb-3">
                    <label for="user_input" class="form-label">Enter the word</label>
                    <input type="text" class="form-control form-control-lg text-center" id="user_input" name="user_input" autocomplete="off" autofocus required>
                </div>
                <button type="submit" class="btn btn-danger w-100 btn-lg">Submit</button>
            </form>
        </div>
    </div>

    <script>
        let timeLeft = parseInt("{{ time_left }}") || 10;
        const badge = document.getElementById('timer-badge');
        
        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                badge.textContent = "0";
                window.location.reload();
            } else {
                badge.textContent = timeLeft;
            }
        }, 1000);
    </script>
</body>
</html>
